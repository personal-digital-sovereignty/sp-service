name: Docker Build & Push

on:
  workflow_dispatch:
    inputs:
      push_to_registry:
        description: 'Push to registry (or just build)'
        type: boolean
        default: true
      platforms:
        description: 'Comma-separated list of platforms to build for'
        type: string
        default: 'linux/amd64,linux/arm64'
      release_tag:
        description: 'Specific release tag to use (leave empty for auto-detection: stable → nightly)'
        type: string
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  # ==========================================
  # Resolve Release Binaries
  # ==========================================
  resolve-release:
    name: "Resolve Release Binaries"
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      release_found: ${{ steps.resolve.outputs.release_found }}
    steps:
      - name: Resolve Release Tag
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"

          # 1. If user specified a tag, use it
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            TAG="${{ github.event.inputs.release_tag }}"
            echo "Using user-specified tag: $TAG"
            echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "release_found=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 2. Try latest stable release first
          STABLE_TAG=$(gh release list --repo "$REPO" --exclude-drafts --exclude-pre-releases --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "")
          if [ -n "$STABLE_TAG" ]; then
            echo "Found stable release: $STABLE_TAG"
            echo "release_tag=$STABLE_TAG" >> "$GITHUB_OUTPUT"
            echo "release_found=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 3. Fallback to nightly pre-release
          NIGHTLY_TAG=$(gh release list --repo "$REPO" --limit 10 --json tagName,isPrerelease -q '.[] | select(.isPrerelease) | .tagName' 2>/dev/null | head -1 || echo "")
          if [ -n "$NIGHTLY_TAG" ]; then
            echo "No stable release found. Using nightly: $NIGHTLY_TAG"
            echo "release_tag=$NIGHTLY_TAG" >> "$GITHUB_OUTPUT"
            echo "release_found=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 4. No release at all — graceful abort
          echo "⚠️ No releases found. Nothing to containerize."
          echo "release_tag=" >> "$GITHUB_OUTPUT"
          echo "release_found=false" >> "$GITHUB_OUTPUT"

  # ==========================================
  # Download Binaries from Release
  # ==========================================
  download-binaries:
    name: "Download Release Binaries"
    needs: resolve-release
    if: needs.resolve-release.outputs.release_found == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux AMD64 Binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.resolve-release.outputs.release_tag }}"
          echo "Downloading sp-service-linux-amd64-binary from release $TAG..."
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern "sp-service-linux-amd64-binary" \
            --output sovereign-daemon-amd64
          chmod +x sovereign-daemon-amd64

      - name: Download Linux ARM64 Binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.resolve-release.outputs.release_tag }}"
          echo "Downloading sp-service-linux-arm64-binary from release $TAG..."
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern "sp-service-linux-arm64-binary" \
            --output sovereign-daemon-arm64
          chmod +x sovereign-daemon-arm64

      - name: Upload AMD64 Binary as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-binary-amd64
          path: sovereign-daemon-amd64
          retention-days: 1

      - name: Upload ARM64 Binary as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-binary-arm64
          path: sovereign-daemon-arm64
          retention-days: 1

  # ==========================================
  # Build and Push Docker Image
  # ==========================================
  build-and-push:
    name: "Build and Push Docker Image"
    needs: [resolve-release, download-binaries]
    if: needs.resolve-release.outputs.release_found == 'true'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Download AMD64 Binary
        uses: actions/download-artifact@v4
        with:
          name: docker-binary-amd64
          path: binaries/amd64

      - name: Download ARM64 Binary
        uses: actions/download-artifact@v4
        with:
          name: docker-binary-arm64
          path: binaries/arm64

      - name: Prepare Binaries
        run: |
          mv binaries/amd64/sovereign-daemon-amd64 binaries/amd64/sovereign-daemon
          mv binaries/arm64/sovereign-daemon-arm64 binaries/arm64/sovereign-daemon
          chmod +x binaries/amd64/sovereign-daemon binaries/arm64/sovereign-daemon
          echo "=== AMD64 ===" && ls -la binaries/amd64/
          echo "=== ARM64 ===" && ls -la binaries/arm64/

      - name: Set up QEMU (for multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Image Name
        id: prep
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          IMG="ghcr.io/$OWNER/sp-service"
          echo "image_name=$(echo "$IMG" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.image_name }}
          tags: |
            type=raw,value=${{ needs.resolve-release.outputs.release_tag }}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event.inputs.push_to_registry != 'false' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ github.event.inputs.platforms || 'linux/amd64,linux/arm64' }}

  # ==========================================
  # Post-Build Security Scan
  # ==========================================
  image-scan:
    name: "Post-Build Image Scan"
    needs: [resolve-release, build-and-push]
    runs-on: ubuntu-latest
    if: needs.resolve-release.outputs.release_found == 'true'
    steps:
      - name: Prepare Image Name
        id: prep
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          IMG="ghcr.io/$OWNER/sp-service"
          echo "image_name=$(echo "$IMG" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Run Trivy vulnerability scanner on image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: ${{ steps.prep.outputs.image_name }}:${{ needs.resolve-release.outputs.release_tag }}
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Print scan summary
        run: |
          echo "============================================"
          echo "  Docker Image Security Scan Summary"
          echo "============================================"
          echo ""
          echo "Release: ${{ needs.resolve-release.outputs.release_tag }}"
          echo "Scan Status: Complete"
          echo ""
          echo "Check the Security tab for detailed results."

  # ==========================================
  # Graceful Abort (No Release Found)
  # ==========================================
  no-release:
    name: "No Release Available"
    needs: resolve-release
    if: needs.resolve-release.outputs.release_found != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Abort Gracefully
        run: |
          echo "============================================"
          echo "  ⚠️  No Release Available"
          echo "============================================"
          echo ""
          echo "No stable or nightly release was found."
          echo "Run the CI pipeline first to generate binaries"
          echo "and publish a nightly or stable release."
          echo ""
          echo "Pipeline exiting cleanly (no error)."
