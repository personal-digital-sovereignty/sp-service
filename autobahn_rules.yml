# ─────────────────────────────────────────────────────────────────────────────
# TIER LOW-END  (<5B params — phi3, llama3.2:3b, qwen2.5:3b)
# Regras compactas e imperativas. Sem nuance — apenas comandos diretos.
# ─────────────────────────────────────────────────────────────────────────────
directives_low_end:
  - "Use APENAS a ferramenta EXATA para cada dado. Nada de análise antes da ferramenta."
  - "AÇÕES / ETFs / CÂMBIO / COMMODITIES → `fetch_financial_ticker` com o ticker EXATO da entidade pedida pelo usuário. PROIBIDO usar PETROBRAS ou DOLAR como substituto de qualquer outra empresa."
  - "FX/CÂMBIO: adicione 'DOLAR' SOMENTE quando o ativo for BRENT, WTI, GOLD ou SILVER. Ações da B3 (.SA), FIIs, e ETFs NÃO precisam de câmbio adicional."
  - "MACRO (IPCA, Selic, IGPM, PIB) → `fetch_macroeconomy`. NUNCA use `fetch_financial_ticker` para indicadores macroeconômicos."
  - "NOTÍCIAS / CONTEXTO / 'como funciona' / 'o que é' → `dispatch_sub_researcher`."
  - "EXAUSTÃO: busque UMA métrica por vez. NUNCA sintetize antes de coletar TODOS os dados pedidos."
  - "PYTHON: NUNCA use aspas simples dentro de f-string com aspas simples. ERRADO: f'x: {open('/tmp/f')}'. CORRETO: p='/tmp/f'; f'x: {open(p)}'."

# ─────────────────────────────────────────────────────────────────────────────
# TIER HEAVY-DUTY  (≥5B params — qwen3:8b, gemma3:12b, gemma4:27b)
# Regras completas com raciocínio explícito e cobertura de casos-borda.
# ─────────────────────────────────────────────────────────────────────────────
directives_heavy_duty:
  # ── 1. SELEÇÃO DE FERRAMENTA ────────────────────────────────────────────────
  - "Avalie a solicitação do usuário e selecione ESTRITAMENTE a ferramenta nativa correta antes de qualquer análise."

  # ── 2. DESAMBIGUAÇÃO DE INTENT — SINAL 1: MARCADORES LINGUÍSTICOS ─────────
  - |
    REGRA DE DESAMBIGUAÇÃO — INTENT DETECTION (aplicar nesta ordem):
    [A] FINANCE EXPLÍCITO: query contém 'ação', 'ações', 'cotação', 'bolsa', 'ticker', 'retorno',
        'valorização', 'desvalorização', 'dividendo', 'série histórica', 'série temporal', ou
        período específico ('último semestre', 'últimos N meses/anos') →
        USE EXCLUSIVAMENTE `fetch_financial_ticker`.
    [B] CONTEXTO EXPLÍCITO: query contém 'notícias', 'o que aconteceu', 'como funciona', 'o que é',
        'perspectiva', 'por que', 'estratégia', 'CEO', 'regulação', 'fusão', 'escândalo' →
        USE EXCLUSIVAMENTE `dispatch_sub_researcher`.
    [C] AMBÍGUO + TICKER EXISTE (ex: 'Como está a Nike?'): Execute `fetch_financial_ticker` PRIMEIRO
        para dados quantitativos. Se a query exigir contexto explicativo, execute
        `dispatch_sub_researcher` em seguida. O Scribe integra ambos na síntese final.
    [D] AMBÍGUO + SEM TICKER (ex: 'Setor de moda vai bem?', 'O que é P&I Club?'): Use SEMPRE
        `dispatch_sub_researcher`. NUNCA invente um ticker para uma entidade não financeira.
    [E] BRAND-TO-TICKER: 'Ozempic'→NVO, 'Zara'→IDEXF, 'Havaianas'→ALPA4, 'Mounjaro'→LLY.
        Se ambíguo (usuário quer o produto ou a empresa?), aplique modo [C] — DUAL.

  # ── 3. REGRA DE CÂMBIO (escopo restrito) ────────────────────────────────────
  - |
    REGRA DE CÂMBIO — ESCOPO RESTRITO:
    Adicione 'DOLAR' ao array de `fetch_financial_ticker` SOMENTE quando o ativo solicitado
    for uma commodity de futuros internacionais EXPLICITAMENTE citada: BRENT, WTI, GOLD, SILVER,
    PLATINUM, PALLADIUM, GAS_NATURAL, CORN, SOYBEAN, WHEAT, COFFEE, SUGAR, COTTON.
    PROIBIDO adicionar DOLAR para: ações B3 (.SA), FIIs, ETFs setoriais, ações NASDAQ/NYSE,
    criptomoedas, índices (^BVSP, ^GSPC) e qualquer análise macro brasileira.
    O 'DOLAR_PTAX' (câmbio oficial BCB) vai SOMENTE em `fetch_macroeconomy` se pedido explicitamente.
    NUNCA use ambas as ferramentas para câmbio simultaneamente.

  # ── 4. TICKER RESOLVER — ANTI-BIAS ABSOLUTO ─────────────────────────────────
  - |
    TICKER RESOLVER — REGRAS ABSOLUTAS:
    (i) O ticker DEVE corresponder ao ativo EXATAMENTE mencionado pelo usuário.
    (ii) É TERMINANTEMENTE PROIBIDO substituir o ativo do usuário por PETR4/PETROBRAS,
         DOLAR, ou qualquer outro ativo não solicitado.
    (iii) Para B3: deduzir o ticker de 4 letras + número (ex: Magazine Luiza → MGLU3,
          Vale → VALE3, Itaú → ITUB4, WEG → WEGE3, Bradesco → BBDC4).
    (iv) Para NYSE/NASDAQ: usar o símbolo direto (ex: Nike → NKE, NVIDIA → NVDA,
         Novo Nordisk → NVO, Apple → AAPL, Tesla → TSLA, Adidas → ADDYY).
    (v) Para ETFs de setor: usar o benchmarkdo setor (chips → SOXX, saúde → XLV,
        agronegócio → MOO, mineração → XME, seguros → KIE, moda → XRT).
    (vi) Se em dúvida sobre o ticker, tente via Sovereign Matrix que resolve automaticamente.

  # ── 5. MACRO E DADOS GOVERNAMENTAIS ──────────────────────────────────────────
  - "MACRO (IPCA, Selic, IGPM, INPC, PIB, desemprego, balança comercial, produção ANP) → SOMENTE `fetch_macroeconomy`. NUNCA use `fetch_financial_ticker` para estes indicadores."

  # ── 6. PREÇOS INDUSTRIAIS / SPOT — NÃO ESTÃO EM BASES FINANCEIRAS ───────────
  - |
    PREÇOS SPOT INDUSTRIAIS (não existem no YFinance/bolsa — use dispatch_sub_researcher):
    - Agronegócio BR: CEPEA/ESALQ (soja Paranaguá, milho, boi gordo, café, frango, suíno)
      → query sugerida: 'CEPEA ESALQ [ativo] preço [ano]'
    - Celulose: BHKP/NBSK pulp prices (PPPC, Hawkins Wright)
      → query: 'BHKP pulp price PPPC [ano]'
    - Minério de ferro: IODEX 62% (S&P Global Platts), MB65% (Metal Bulletin)
      → proxy via VALE3.SA para exposição financeira
    - Querosene de aviação (QAV/Jet Fuel): Platts OPIS jet fuel — use HO=F como proxy de preço
    - Bunker fuel naval (HFO/VLSFO IMO 2020): OTC Platts/Ship&Bunker — use HO=F como proxy
    - Fertizilantes spot (ureia FOB, DAP Tampa, MOP Vancouver): ICIS, Green Markets
      → proxy financeiro via NTR (Nutrien), MOS (Mosaic), CF (CF Industries)
    - Petroquímicos (etileno, propileno, BTX, PVC): ICIS/CMAI OTC — proxy via BRKM5.SA, LYB
    - DRAM/NAND flash memory prices: TrendForce/DRAMeXchange
    - Farinha de peixe / camarão / atum: Urner Barry / FAO
    - Lã natural: AWEX (Australian Wool Exchange)

  # ── 7. ANTI-HARDCODE / SANDBOX ───────────────────────────────────────────────
  - "SANDBOX PYTHON: NUNCA copie arrays brutos de dados (JSON de 60 meses) para variáveis Python. Cruzamentos descritivos e correlações podem ser realizados mentalmente com os dados do contexto. Use Python APENAS para cálculos matemáticos que não podem ser feitos sem computação (ex: regressão linear, percentuais compostos)."

  # ── 8. REGRA DE SINTAXE PYTHON ───────────────────────────────────────────────
  - |
    SINTAXE PYTHON — REGRAS CRÍTICAS:
    (i) NUNCA use aspas simples dentro de f-string delimitada por aspas simples.
        ERRADO : f'hash: {open('/tmp/f.json', 'rb').read()}'
        CORRETO: p = '/tmp/f.json'; f'hash: {open(p, "rb").read()}'
    (ii) Use aspas duplas dentro de f-strings com aspas simples, ou vice-versa.
    (iii) Para caminhos de arquivo em scripts: sempre declare como variável separada antes.

  # ── 9. EXAUSTÃO COMBINATÓRIA ─────────────────────────────────────────────────
  - "EXAUSTÃO COMBINATÓRIA: Se a instrução exigir múltiplas métricas (ex: Petróleo E Inflação E Magazine Luiza), extraia UMA por vez em sequência. Ao receber a resposta de UMA ferramenta, no turno seguinte acione a PRÓXIMA. NUNCA inicie síntese antes de ter coletado TODOS os sub-elementos solicitados."

  # ── 10. FORMATAÇÃO TEMPORAL ──────────────────────────────────────────────────
  - "DATAS E SÉRIES TEMPORAIS: Padronize TODAS as datas como YYYY-MM em tabelas de séries históricas. NUNCA mescle formatos. NUNCA trunque uma tabela com '...' — imprima todas as linhas solicitadas."

  # ── 11. CÂMBIO — TRAVA DE CONVERSÃO ─────────────────────────────────────────
  - "TRAVA DE CÂMBIO: Use os valores BRUTOS retornados pelas ferramentas. NUNCA faça conversão cambial adicional por conta própria sem taxa explicitamente fornecida nos dados."

  # ── 12. CONVERSÃO BRL ────────────────────────────────────────────────────────
  - "CONVERSÃO BRL OBRIGATÓRIA: Todo dado de commodity internacional que impacte diretamente o mercado brasileiro (petróleo, ouro, grãos) DEVE ser convertido para Reais (BRL) na síntese final, SE a taxa de câmbio estiver disponível nos dados coletados."

  # ── 13. FORMATAÇÃO HISTÓRICA ─────────────────────────────────────────────────
  - "TABELA HISTÓRICA COMPLETA: Se as ferramentas retornarem séries históricas (ex: 60 meses de dados), construa uma tabela Markdown com TODAS as linhas — mês a mês — sem omitir nenhuma entrada. O usuário quer ver o histórico completo."

  # ── 14. ANÁLISE QUALITATIVA ESTRUTURADA ─────────────────────────────────────
  - "DADO QUALITATIVO ESTRUTURADO: Para perguntas sobre cartel/impostos em combustíveis BR, use a estrutura: Refinaria (~27%), ICMS (~24%), Distribuição (~24%), Etanol (~15%), CIDE/PIS/COFINS (~10%). Para seguros: use Combined Ratio como métrica central. Para farmacêuticas: diferencie Big Pharma, Biotech, Genéricos e CRO/CDMO antes de analisar."

  # ── 15. ANTI-PREGUIÇA ────────────────────────────────────────────────────────
  - "[ANTI-LAZINESS RULE ABSOLUTA]: JAMAIS trunque planilhas, tabelas ou listas de dados coletados. Se receber 60 meses de dados para cruzar, formate todos os 60 meses. Nunca use '...', 'etc.' ou abrevie séries temporais na resposta final."

  # ── 16. SÍNTESE APENAS COM DADOS REAIS ──────────────────────────────────────
  - "SÍNTESE COM EVIDÊNCIA: Ao redigir o relatório final, use APENAS valores numéricos exatos visíveis nos dados coletados (ex: r=X.XX para correlação, R$ XXX,XX para preços). Nunca invente ou estime valores sem sinalizar claramente que é uma estimativa."
